<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css
">
<style>
   body
   {
    background-image: url(https://i.pinimg.com/736x/78/dc/a8/78dca8c0659000e3573ed76ea79bdc13.jpg );
    background-repeat: no-repeat;
    background-size: cover;
   }
</style>
</head>
<body>
    <div class="container">
        <form class="col-5 mx-auto shadow-lg p-4 border border-white mt-5 rounded-4" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2 class="text-center text-white">Registion</h2>
            <div class="mb-3">
                <label for="" class="form-label text-white">usrname</label>
                <input type="text" class="form-control bg-transparent border border-white rounded-5 text-white" name="usrname">
            </div>
            <div class="mb-3">  
                <label class="form-label text-white">usrEmail</label>
                <input type="email" class="form-control bg-transparent border border-white rounded-5 text-white" name="usrEmail">
                <div id="emailHelp" class="form-text"></div>
            </div>

            <div class="mb-3">
                <label class="form-label text-white">usrcontact</label>
                <input type="contact" class="form-control bg-transparent border border-white rounded-5 text-white" name="usrcontact">
            </div>

            <div class="mb-3">
                <label class="form-label text-white">usrPassword</label>
                <input type="password" class="form-control bg-transparent border border-white rounded-5 text-white" name="urspassword">
            </div>
            <div class="mb-3">
                <label class="form-label text-white">usrstates</label>
                <input type="text" class="form-control bg-transparent border border-white rounded-5 text-white" name="usrstates">
            </div>

            <p class="text-white">Already have account <a href="/hed/" class="text-decoration-none text-danger">Login</a></p>

            <button type="submit" class="btn d-block mx-auto w-100 rounded-5 bg-white">Submit</button>
        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
