{% extends 'shreya.html' %}
{% block start %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login From</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css
">
<style>
     /* body{
        -background-image: url(https://makemyhotelapp.com/assets/login/img/login-bg.png);
    } */
    form{
        margin-top:5%;
        border-radius: 10px;
        border: 1px solid white;
        background-image: url(https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQAl6sfxm6PaBoeN1rrXSv2IfqWaOPShVuSe5j23f1Lh4FSvlGO);
        background-repeat: no-repeat;
        background-size: cover;
    } 
</style>
</head>
<body>
   
    <div class="container">
        <form action="" class="mx-auto col-5 hadow-lg p-4" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2>Login Page</h2>
            <div class="mb-3">
                <label for="" class="form-label">Name</label>
                <input type="text" class="form-control" name="pasname">
            </div>

            <div class="mb-3">
                <label for="" class="form-label">Contact</label>
                <input type="text" class="form-control" name="pascontact">
            </div>

            <div class="mb-3">
                <label for="" class="form-label">Address</label>
                <input type="text" class="form-control" name="pasaddress">
            </div>

            <div class="mb-3">
                <label for="" class="form-label">City</label>
                <input type="text" class="form-control" name="pascity">
            </div>

            <div class="mb-3">
                <label for="" class="form-label">Status</label>
                <input type="checkbox" class="form-check" name="pasStatus">
            </div>


             <button type="submit" class="btn border border-white w-100 mt-2 text-white">Submit</button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
{% endblock %}
