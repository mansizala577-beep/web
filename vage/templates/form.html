<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        form 
        {
            background-image: url(https://qor7tech.com/wp-content/uploads/2019/07/contacts_img_02.png);
        }
    
        
        h4 {
            font-size: 20px;
            font-family: 'Kanit', sans-serif;
        }

        .box {
            border: 1px solid silver;

            width: 250px;
            border-radius: 5px;
            padding: 15px;
        }

        input,
        .checkbox {
            background-color: rgb(25, 247, 169);
        }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container mt-5">
        <form action="" class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h4 class="mb-3">Send us a Message</h4>
            <div class="mb-3">
                <label for="name" class="form-label">Name<span class="text-danger">*</span></label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="email" class="form-label">Email (optional)</label>
                    <input type="email" id="email" name="email" class="form-control">
                </div>
                <div class="col-6">
                    <label for="contact" class="form-label">Contact<span class="text-danger">*</span></label>
                    <input type="text" id="contact" name="contact" class="form-control" required>

                </div>
            </div>


            <div class="mb-3">


                <label for="message" class="form-label">Message<span class="text-danger">*</span></label>

                <textarea id="message" name="message" class="form-control" rows="4" required></textarea>

            </div>
            <div class="box">
                <input type="checkbox">
            </div>


            <button type="submit" class="btn btn-primary mt-5">Send Message</button>
        </form>
    </div>

</body>

</html>
