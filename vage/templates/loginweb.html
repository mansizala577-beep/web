<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login From</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css
">
<style>
    body{
        background-image: url(https://i.pinimg.com/1200x/07/fb/88/07fb88b54c0ecc8fee5945977beddb5a.jpg);
        background-size: cover;
    }
    form{
        margin-top: 10%;
        border-radius: 10px;
        border: 1px solid white;
    }
</style>
</head>
<body>
    
    <div class="container">
        <form action="" class="col-5 mx-auto shadow-lg p-4" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2 class="text-center text-white">Login</h2>
            <div class="mb-3 ">
                <label for="" class="form-label boder text-white">Usrname</label>
                <input type="text" class="form-control bg-transparent border-white rounded-5 text-white"  name="Usrname">
            </div>

            <div class="mb-3">
                <label for="" class="fform-label text-white">UsrPassword</label>
                <input type="text" class="form-control bg-transparent border-white rounded-5 text-white" name="UsrPassword">
            </div>
            
            <button type="submit" class="btn bg-white w-100 mt-2  rounded-5 bg-white">Submit</button>
            <div class="mt-3 text-white">
                <a href="#" class="text-white text-decoration-none">Don't have an account? Registaration</a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
