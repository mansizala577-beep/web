<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <form action="" class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label for="" class="form-label" >Receipes Name</label>
                <input type="text" class="form-control" name="name">
                
            </div>

             <div class="mb-3">`
                <label for="" class="form-label" >Receipes Description</label>

               <textarea class="form-control" name="description"></textarea>
            </div>

            <div class="mb-3">
                <label>Receipes Image</label>
                <input type="file" class="form-control" name="image">
            </div>
            

            <button class="btn btn-primary" type="submit">Submit</button>
        </form>
    </div>
{{ receipes }}

<table class="table table-bordered table-hover">
    <tr>
        <th>sir no</th>
        <th>Name</th>
        <th>Description</th>
        <th>Image</th>
        <th>Delete</th>
        <th>update</th>
    </tr>
    {% for item in receipes %}
    
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.description }}</td>
        <td><img src="/media/{{item.image}}" height="auto" width="50px" alt=""></td>
        <td><a href="{% url 'delete' item.id %}">delete</a></td>
         <td><a href="{% url 'update' item.id %}">update</a></td>

    </tr>

    {% endfor %}
     

    
</table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
